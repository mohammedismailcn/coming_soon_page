<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Properdeal.in | Coming Soon</title>
    <meta
      name="description"
      content="Properdeal.in is coming soon. We are working to give you the best experience."

    <link rel="preconnect" href="https://unpkg.com">
    <link rel="dns-prefetch" href="https://unpkg.com">
    <link rel="modulepreload" href="app.js">
    <link rel="icon" href="assets/favicon.png" type="image/png">
<link rel="stylesheet" href="styles.css">

  <body>
    <svg width="0" height="0" style="position:absolute" aria-hidden="true">
      <defs>
        <filter id="underwater-ripple" x="-20%" y="-20%" width="140%" height="140%">
          <feTurbulence
            type="fractalNoise"
            baseFrequency="0.012 0.018"
            numOctaves="2"
            seed="7"
            result="noise"
          >
            <animate
              attributeName="baseFrequency"
              dur="14s"
              values="0.010 0.016;0.016 0.010;0.010 0.016"
              repeatCount="indefinite"
            />
          </feTurbulence>
          <feDisplacementMap in="SourceGraphic" in2="noise" scale="9" xChannelSelector="R" yChannelSelector="G" />
        </filter>
      </defs>
    </svg>

    <canvas id="river-canvas" aria-hidden="true"></canvas>
    <div class="water-overlay" aria-hidden="true"></div>

    <main class="coming-soon" aria-label="Properdeal.in coming soon">
      <div class="logo-mark" aria-label="Properdeal logo">
        <img src="assets/properdeal-logo.png" alt="Properdeal" width="1081" height="526" decoding="async" fetchpriority="high" onload="this.nextElementSibling.hidden=true" onerror="this.hidden=true">
        <span aria-hidden="true">PD</span>
      </div>

      <h1>We're Coming Soon</h1>
      <div class="divider" aria-hidden="true"></div>
      <p>We're coming soon! We're working hard to give you the best experience.</p>
